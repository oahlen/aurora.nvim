name = "aurora"
background = "dark"

[hues]

base   = 225
red    = 350
orange = 25
yellow = 40
green  = 90
cyan   = 190
blue   = 215
purple = 275

[colors]

bg0 = "hsl($base, 0.15, 0.13)" # Main background
bg1 = "hsl($base, 0.15, 0.17)" # Cursorline
bg2 = "hsl($base, 0.15, 0.21)" # Visual background
bg3 = "hsl($base, 0.15, 0.25)" # Non text/Pmenu background 1.47:1
bg4 = "hsl($base, 0.15, 0.36)" # LineNr 2.22:1
bg5 = "hsl($base, 0.15, 0.44)" # Float borders

grey = "hsl($base, 0.15, 0.56)" # 4.55:1

fg0 = "hsl($base, 0.25, 0.74)"
fg1 = "hsl($base, 0.25, 0.82)"
fg2 = "hsl($base, 0.25, 0.88)"

red    = "hsl($red, 0.85, 0.75)"    # Check
orange = "hsl($orange, 1, 0.72)"    # -
yellow = "hsl($yellow, 0.80, 0.70)" # -
green  = "hsl($green, 0.50, 0.65)"  # Check
cyan   = "hsl($cyan, 0.65, 0.72)"   # -
blue   = "hsl($blue, 0.85, 0.75)"   # Check
purple = "hsl($purple, 0.75, 0.80)" # -

bg_red    = "mix(red, bg0, 0.1)"
bg_yellow = "mix(yellow, bg0, 0.1)"
bg_green  = "mix(green, bg0, 0.1)"
bg_cyan   = "mix(cyan, bg0, 0.1)"
bg_blue   = "mix(blue, bg0, 0.1)"
bg_purple = "mix(purple, bg0, 0.1)"

diff_add_bg    = "mix(green, bg0, 0.2)"
diff_text_bg   = "mix(cyan, bg0, 0.2)"
diff_delete_bg = "mix(red, bg0, 0.2)"

black = "bg2"
white = "fg1"

statusline_bg = "hsl($base, 0.15, 0.1)"

[highlights]

# Custom highlight groups
Foreground = "fg1"

Red     = "red"
Orange  = "orange"
Yellow  = "yellow"
Green   = "green"
Cyan    = "cyan"
Blue    = "blue"
Purple  = "purple"

Normal      = "fg1 bg0"
NormalNC    = "fg1 bg0"
NormalFloat = "fg1 bg0"
FloatBorder = "bg5"

EndOfBuffer = "bg3"
NonText     = "bg3"
Whitespace  = "bg3"

Cursor        = "bg0 fg1"
Cursorline   = "- bg1"
CursorlineNr = "orange bg1 b"
ColorColumn  = "- bg2"
Folded       = "fg1 bg2"
LineNr       = "bg4"
SignColumn   = "link:LineNr"
Visual       = "- bg2"
WinSeparator = "bg3"

Pmenu      = "fg1 bg3"
PmenuSbar  = "- bg3"
PmenuSel   = "bg0 blue"
PmenuThumb = "- grey"

StatusLine    = "fg1 statusline_bg"
StatusLineNC  = "fg0 statusline_bg"
TabLine       = "fg1 bg4"
TabLineFill   = "fg1 statusline_bg"
TabLineSel    = "bg0 blue"

Search     = "bg0 yellow"
CurSearch  = "bg0 orange"
IncSearch  = "- - r"
Substitute = "bg0 orange"
MatchParen = "- bg3"

Added   = "green"
Changed = "blue"
Removed = "red"

DiffAdd    = "green diff_add_bg"
DiffText   = "blue diff_text_bg"
DiffDelete = "red diff_delete_bg"

ErrorMsg   = "red"
ModeMsg    = "grey"
MoreMsg    = "cyan"
Question   = "blue"
QuickFixLine = "- bg3 b"
WarningMsg = "yellow"

SpellBad   = "- - c red"
SpellCap   = "- - c yellow"
SpellLocal = "- - c blue"
SpellRare  = "- - c cyan"

# Diagnostics
DiagnosticUnderlineOk    = "- - u green"
DiagnosticUnderlineInfo  = "- - u blue"
DiagnosticUnderlineHint  = "- - u grey"
DiagnosticUnderlineWarn  = "- - u yellow"
DiagnosticUnderlineError = "- - u red"

DiagnosticOk    = "green bg_green"
DiagnosticInfo  = "blue bg_blue"
DiagnosticHint  = "grey bg2"
DiagnosticWarn  = "yellow bg_yellow"
DiagnosticError = "red bg_red"

DiagnosticSignOk    = "green"
DiagnosticSignInfo  = "blue"
DiagnosticSignHint  = "grey"
DiagnosticSignWarn  = "yellow"
DiagnosticSignError = "red"

# Syntax
Bold         = "fg1 - b"
Character    = "green"
Comment      = "grey"
Constant     = "orange"
Debug        = "red"
Define       = "purple"
Delimiter    = "fg0"
Directory    = "blue"
Error        = "red"
Float        = "orange"
Function     = "blue"
Identifier   = "fg1"
Include      = "purple"
Italic       = "fg1 - i"
Keyword      = "purple"
Number       = "orange"
Operator     = "fg1"
PreCondit    = "cyan"
PreProc      = "cyan"
Repeat       = "purple"
SpecialChar  = "yellow"
